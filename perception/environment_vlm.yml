# robot_perception_vlm: MiniCPM-V GPTQ local inference (transformers serve).
# Synced from verified test machine export (2026-06-24).
# Keep separate from robot_perception — GDINO/SAM2/Cutie require transformers 4.x.
#
# Create:  bash scripts/setup_vlm_env.sh
# Update:  bash scripts/sync_env_vlm.sh update
# Export:  conda env export -n robot_perception_vlm --no-builds > environment_vlm.yml
#
# Key pins: transformers 5.12.1, gptqmodel 7.1.0, optimum 2.2.0, torch 2.8.0+cu128
# Do NOT add prefix: when committing (machine-specific).

