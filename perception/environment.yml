# robot_perception conda environment (detection_bbox + Pixel3D).
# Synced from verified test machine export (2026-06-24).
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -n robot_perception -f environment.yml --prune
# Export:  bash sync_env.sh export
#
# Notes:
# - GDINO imports via ROBOT_PERCEPTION_DIR/sys.path (no groundingdino pip pin).
# - VLM (MiniCPM) uses separate env: environment_vlm.yml
# - Do NOT add prefix: line when committing (machine-specific).

