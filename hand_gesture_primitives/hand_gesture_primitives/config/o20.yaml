# LinkerHand O20 关节配置
# 20-DOF, 内部表示与硬件表示一致 (identity mapping)

hand_joint: O20
num_joints: 20

joint_names:
  - thumb_base
  - index_base
  - middle_base
  - ring_base
  - pinky_base
  - thumb_abd
  - index_abd
  - middle_abd
  - ring_abd
  - pinky_abd
  - thumb_rot
  - rsv_11
  - rsv_12
  - rsv_13
  - rsv_14
  - thumb_tip
  - index_tip
  - middle_tip
  - ring_tip
  - pinky_tip

# O20 内部索引 → 硬件索引映射 (identity, 不反转)
from_o20:
  0:  {to: 0,  invert: false}
  1:  {to: 1,  invert: false}
  2:  {to: 2,  invert: false}
  3:  {to: 3,  invert: false}
  4:  {to: 4,  invert: false}
  5:  {to: 5,  invert: false}
  6:  {to: 6,  invert: false}
  7:  {to: 7,  invert: false}
  8:  {to: 8,  invert: false}
  9:  {to: 9,  invert: false}
  10: {to: 10, invert: false}
  15: {to: 15, invert: false}
  16: {to: 16, invert: false}
  17: {to: 17, invert: false}
  18: {to: 18, invert: false}
  19: {to: 19, invert: false}

reserved:
  indices: [11, 12, 13, 14]
  default: 0

calibration: {}

# 正运动学配置 (FK)
# O20 使用自己的 URDF (与 L20 关节限位不同, 不可混用)
fk:
  urdf_model: o20
  base_link: hand_link
  fingertip_links:
    - thumb_proximal_Link
    - index_distal_Link
    - middle_distal_Link
    - ring_distal_Link
    - pinky_distal_Link
  # URDF 正方向与 O20 硬件约定相反的关节 (需反转映射)
  # thumb_cmc_yaw: O20 val↑=内收, 但 URDF 正角度=外展
  invert_joints:
    - thumb_cmc_yaw
  # 指肚接触面偏移 (link 局部坐标系, 单位: 米)
  # 从 link origin (DIP/MCP 关节轴心) 偏移到指肚中心
  # [x, y, z]: x=掌侧(正), y=侧向, z=沿骨方向(指尖)
  # 依据 O20 mesh 几何实测: distal link 长约 52mm, 指肚在 ~60% 处 + 掌侧 6mm
  # 注意: 拇指 mesh 是多壳结构, pad外表面在 X≈-2mm, 不能用太大负值
  tip_offsets:
    thumb_proximal_Link: [-0.003, 0.0, 0.027]
    index_distal_Link:   [0.006, 0.0, 0.030]
    middle_distal_Link:  [0.006, 0.0, 0.030]
    ring_distal_Link:    [0.006, 0.0, 0.030]
    pinky_distal_Link:   [0.006, 0.0, 0.030]
  o20_to_urdf_joint:
    0:  thumb_cmc_roll
    1:  index_mcp_pitch
    2:  middle_mcp_pitch
    3:  ring_mcp_pitch
    4:  pinky_mcp_pitch
    5:  thumb_cmc_yaw
    6:  index_mcp_roll
    7:  middle_mcp_roll
    8:  ring_mcp_roll
    9:  pinky_mcp_roll
    10: thumb_cmc_pitch
    15: thumb_mcp
    16: index_dip
    17: middle_dip
    18: ring_dip
    19: pinky_dip
  # 左手覆盖: URDF 关节/link 命名与右手不同
  side_overrides:
    left:
      fingertip_links:
        - thumb_distal_Link
        - index_distal_Link
        - middle_distal_Link
        - ring_distal_Link
        - pinky_distal_Link
      invert_joints: []
      tip_offsets:
        thumb_distal_Link:   [-0.003, 0.0, 0.027]
        index_distal_Link:   [0.006, 0.0, 0.030]
        middle_distal_Link:  [0.006, 0.0, 0.030]
        ring_distal_Link:    [0.006, 0.0, 0.030]
        pinky_distal_Link:   [0.006, 0.0, 0.030]
      o20_to_urdf_joint:
        15: thumb_dip

# ---------------------------------------------------------------------------
# 手型能力 & 原语白名单
# ---------------------------------------------------------------------------
capabilities:
  finger_abd: true
  thumb_abd: true
  thumb_rot: true
  finger_tips: true
  thumb_tip: true
  finger_root2: false
  vision_fk: true
  touch: true
  current: true

primitives:
  mode: allowlist
  supported:
    - init
    - open
    - release
    - relax_grip
    - fist
    - pinch
    - point
    - ok_sign
    - v_sign
    - thumb_adduction_grip
    - index_middle_adduction_grip
    - tripod
    - ring
    - middle_ring
    - index_pinch
    - middle_pinch
    - parallel_extension
    - index_ring_by_vision
    - large_wrap_by_vision
    - middle_ring_by_vision
    - ring_by_vision
    - small_warp_by_vision
    - no_index_warp_by_vision
    - hook_by_vision
    - index_pinch_by_vision
    - middle_pinch_by_vision
    - tripod_by_vision
    - palmar_by_vision
    - parallel_extension_by_vision
    - disk_by_vision
  grasp_type_map:
    precision: index_ring_by_vision
    lateral: index_middle_adduction_grip
    power: large_wrap_by_vision

# ---------------------------------------------------------------------------
# 手势参数（O20 semantic 稀疏 joint 名）
# ---------------------------------------------------------------------------
gestures:
  thumb_adduction_grip:
    angles:
      space: semantic_o20
      target:
        thumb_base: 255
        thumb_abd: 130
        thumb_rot: 170
        thumb_tip: 135
        index_base: 160
        middle_base: 160
        ring_base: 160
        pinky_base: 160
        index_tip: 140
        middle_tip: 140
        ring_tip: 140
        pinky_tip: 140
    motion:
      phase1: 0.35
      phase2: 0.40
      phase3: 0.35
      phase4: 0.65
    joints:
      hold: [0, 5, 10, 15]
      flex: [0, 15]
      rot: 10
    progressive:
      abd: 5
      flex: 15
      abd_max: 185
      flex_max: 150
      rate: 20.0
    contact:
      fingers: [0, 1]

  open:
    angles:
      space: semantic_o20
      target:
        thumb_base: 0
        index_base: 0
        middle_base: 0
        ring_base: 0
        pinky_base: 0
        thumb_abd: 0
        index_abd: 128
        middle_abd: 128
        ring_abd: 128
        pinky_abd: 128
        thumb_rot: 0
        thumb_tip: 0
        index_tip: 0
        middle_tip: 0
        ring_tip: 0
        pinky_tip: 0
    motion:
      type: static
      duration: 0.6

  init:
    angles:
      space: semantic_o20
      target:
        thumb_base: 80
        index_base: 80
        middle_base: 80
        ring_base: 80
        pinky_base: 80
        thumb_abd: 60
        index_abd: 128
        middle_abd: 128
        ring_abd: 128
        pinky_abd: 128
        thumb_rot: 50
        thumb_tip: 60
        index_tip: 60
        middle_tip: 60
        ring_tip: 60
        pinky_tip: 60
    motion:
      type: static
      duration: 0.8

  fist:
    angles:
      space: semantic_o20
      target:
        thumb_base: 60
        index_base: 255
        middle_base: 255
        ring_base: 255
        pinky_base: 255
        thumb_abd: 200
        index_abd: 128
        middle_abd: 128
        ring_abd: 128
        pinky_abd: 128
        thumb_rot: 230
        thumb_tip: 255
        index_tip: 255
        middle_tip: 255
        ring_tip: 255
        pinky_tip: 255
    motion:
      type: phased_pose
      phase1: 0.5
      phase2: 0.4
      phase3: 0.4
      phase4: 0.4
    joints:
      hold: [0, 5, 10, 15]

  release:
    motion:
      type: static
      duration: 0.6

  relax_grip:
    motion:
      type: relax_grip
      duration: 0.6
      hold_duration: 0.3
      grip_duration: 0.4
